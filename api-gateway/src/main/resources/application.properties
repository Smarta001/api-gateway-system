# Downstream Services
services.user-service.url=${SERVICES_USER_SERVICE_URL:http://localhost:8081}
services.order-service.url=${SERVICES_ORDER_SERVICE_URL:http://localhost:8082}
services.product-service.url=${SERVICES_PRODUCT_SERVICE_URL:http://localhost:8083}

# Logging
logging.level.com.gateway=DEBUG
