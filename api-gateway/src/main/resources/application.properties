server.port=${PORT:8080}

# MongoDB
spring.data.mongodb.uri=mongodb://127.0.0.1:27017/api_gateway
spring.data.mongodb.database=api_gateway
spring.data.mongodb.uri=mongodb://127.0.0.1:27017/api_gateway
spring.data.mongodb.auto-index-creation=true

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Rate Limiting Defaults
ratelimit.token-bucket.capacity=10
ratelimit.token-bucket.refill-rate=5
ratelimit.leaky-bucket.capacity=10
